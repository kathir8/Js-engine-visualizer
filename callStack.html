<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Call Stack Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #111218;
    --card: #16181f;
    --border: #1e2130;
    --accent: #00e5ff;
    --accent2: #ff6b6b;
    --accent3: #a78bfa;
    --accent4: #34d399;
    --text: #e2e8f0;
    --muted: #4a5568;
    --code-bg: #0d0f16;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .badge {
    margin-left: auto;
    padding: 4px 12px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Main Grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto auto;
    gap: 20px;
  }

  /* Code Panel */
  .code-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    grid-row: span 2;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }

  .panel-title {
    margin-left: 6px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .code-area {
    padding: 20px;
    background: var(--code-bg);
    height: calc(100% - 49px);
    overflow-y: auto;
  }

  .code-lines {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .code-line {
    display: flex;
    gap: 16px;
    padding: 3px 8px;
    border-radius: 4px;
    transition: background 0.2s;
    cursor: pointer;
    position: relative;
  }

  .code-line:hover { background: rgba(255,255,255,0.04); }

  .code-line.active {
    background: rgba(0, 229, 255, 0.08);
    border-left: 2px solid var(--accent);
  }

  .code-line.executing {
    background: rgba(0, 229, 255, 0.15);
    animation: pulse-line 0.6s ease;
  }

  @keyframes pulse-line {
    0% { background: rgba(0, 229, 255, 0.4); }
    100% { background: rgba(0, 229, 255, 0.15); }
  }

  .line-no {
    color: var(--muted);
    font-size: 12px;
    min-width: 24px;
    text-align: right;
    user-select: none;
  }

  .line-code {
    font-size: 13px;
    line-height: 1.7;
    white-space: pre;
  }

  /* Syntax colors */
  .kw { color: #c792ea; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .num { color: #f78c6c; }
  .cmt { color: #546e7a; font-style: italic; }
  .var-c { color: var(--accent); }
  .op { color: #89ddff; }
  .param { color: #ffcb6b; }

  /* Right column */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Call Stack Panel */
  .stack-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    flex: 1;
  }

  .stack-visual {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 260px;
    position: relative;
  }

  .stack-label {
    position: absolute;
    bottom: 16px;
    left: 16px;
    right: 16px;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-top: 1px dashed var(--border);
    padding-top: 8px;
  }

  .stack-frame {
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid;
    animation: frame-push 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: top;
    position: relative;
    overflow: hidden;
  }

  .stack-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
  }

  @keyframes frame-push {
    from { transform: scaleY(0) translateY(-10px); opacity: 0; }
    to { transform: scaleY(1) translateY(0); opacity: 1; }
  }

  @keyframes frame-pop {
    to { transform: scaleY(0) translateY(-10px); opacity: 0; height: 0; margin: 0; padding: 0; }
  }

  .frame-popping {
    animation: frame-pop 0.25s ease forwards;
  }

  .frame-icon { font-size: 14px; }

  .frame-name {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .frame-line {
    font-size: 10px;
    opacity: 0.6;
  }

  /* Color variants for frames */
  .frame-0 { background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.3); }
  .frame-0 .frame-name { color: var(--accent); }
  .frame-0::before { background: var(--accent); }

  .frame-1 { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.3); }
  .frame-1 .frame-name { color: var(--accent3); }
  .frame-1::before { background: var(--accent3); }

  .frame-2 { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.3); }
  .frame-2 .frame-name { color: var(--accent4); }
  .frame-2::before { background: var(--accent4); }

  .frame-3 { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.3); }
  .frame-3 .frame-name { color: var(--accent2); }
  .frame-3::before { background: var(--accent2); }

  .frame-4 { background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.3); }
  .frame-4 .frame-name { color: #fbbf24; }
  .frame-4::before { background: #fbbf24; }

  .empty-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 8px;
    padding-bottom: 30px;
  }

  .empty-stack .icon { font-size: 28px; opacity: 0.4; }
  .empty-stack p { font-size: 11px; text-align: center; line-height: 1.6; }

  /* Controls Panel */
  .controls-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-run {
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(167,139,250,0.15));
    color: var(--accent);
    border-color: rgba(0,229,255,0.3);
    grid-column: span 2;
    padding: 12px;
  }

  .btn-run:hover:not(:disabled) {
    background: linear-gradient(135deg, rgba(0,229,255,0.25), rgba(167,139,250,0.25));
    box-shadow: 0 0 20px rgba(0,229,255,0.15);
  }

  .btn-step {
    background: rgba(167,139,250,0.1);
    color: var(--accent3);
    border-color: rgba(167,139,250,0.3);
  }

  .btn-step:hover:not(:disabled) {
    background: rgba(167,139,250,0.2);
  }

  .btn-reset {
    background: rgba(255,107,107,0.08);
    color: var(--accent2);
    border-color: rgba(255,107,107,0.25);
  }

  .btn-reset:hover:not(:disabled) {
    background: rgba(255,107,107,0.15);
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .speed-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
  }

  /* Log Panel */
  .log-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .log-body {
    padding: 12px 16px;
    max-height: 160px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.7;
  }

  .log-entry {
    display: flex;
    gap: 10px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: log-in 0.3s ease;
  }

  @keyframes log-in {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-ts { color: var(--muted); min-width: 40px; }
  .log-push { color: var(--accent4); }
  .log-pop { color: var(--accent2); }
  .log-exec { color: var(--accent); }
  .log-info { color: var(--muted); }

  /* Preset selector */
  .preset-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .preset-btn {
    padding: 6px 12px;
    font-size: 11px;
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }

  .preset-btn:hover, .preset-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 12px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }

  .status-dot.running { background: var(--accent4); box-shadow: 0 0 6px var(--accent4); animation: blink 1s infinite; }
  .status-dot.done { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.error { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .status-text { color: var(--muted); }
  .step-counter { margin-left: auto; color: var(--muted); font-size: 11px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .code-panel { grid-row: auto; height: 400px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">⚡</div>
    <div>
      <h1>Call Stack <span>Visualizer</span></h1>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">JavaScript execution engine simulator</div>
    </div>
    <div class="badge">Live Demo</div>
  </header>

  <div class="preset-row" id="presets">
    <button class="preset-btn active" onclick="loadPreset('recursion')">Recursion</button>
    <button class="preset-btn" onclick="loadPreset('nested')">Nested Calls</button>
    <button class="preset-btn" onclick="loadPreset('closures')">Closures</button>
    <button class="preset-btn" onclick="loadPreset('async')">Callbacks</button>
  </div>

  <div class="main-grid">
    <!-- Code Panel -->
    <div class="code-panel">
      <div class="panel-header">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
        <span class="panel-title" id="file-name">script.js</span>
      </div>
      <div class="code-area">
        <div class="code-lines" id="code-display"></div>
      </div>
    </div>

    <!-- Right Column -->
    <div class="right-col">
      <!-- Status -->
      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Ready to execute</span>
        <span class="step-counter" id="step-counter">Step 0 / 0</span>
      </div>

      <!-- Call Stack -->
      <div class="stack-panel">
        <div class="panel-header">
          <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
          <span class="panel-title">CALL STACK</span>
          <span style="margin-left:auto;font-size:11px;color:var(--accent)" id="stack-depth">depth: 0</span>
        </div>
        <div class="stack-visual" id="stack-visual">
          <div class="empty-stack" id="empty-msg">
            <div class="icon">📋</div>
            <p>Call stack is empty.<br>Press Run or Step to begin.</p>
          </div>
          <div class="stack-label">▲ STACK GROWS UP</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-panel">
        <div class="controls-grid">
          <button class="btn-run" id="btn-run" onclick="runAll()">▶ Run All</button>
          <button class="btn-step" id="btn-step" onclick="stepForward()">⏭ Step →</button>
          <button class="btn-reset" onclick="resetVisualization()">↺ Reset</button>
        </div>
        <div class="speed-control">
          <span class="speed-label">Speed</span>
          <input type="range" id="speed" min="100" max="1500" value="700" step="100">
          <span class="speed-label" id="speed-val">700ms</span>
        </div>
      </div>

      <!-- Log -->
      <div class="log-panel">
        <div class="panel-header">
          <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
          <span class="panel-title">EXECUTION LOG</span>
          <button onclick="document.getElementById('log-body').innerHTML=''" style="margin-left:auto;padding:2px 8px;font-size:10px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:4px;">clear</button>
        </div>
        <div class="log-body" id="log-body"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── PRESETS ───────────────────────────────────────────────────────────────
const PRESETS = {
  recursion: {
    name: 'recursion.js',
    code: [
      { text: `<span class="kw">function</span> <span class="fn">factorial</span>(<span class="param">n</span>) {`, fn: null },
      { text: `  <span class="kw">if</span> (<span class="param">n</span> <span class="op">===</span> <span class="num">1</span>) <span class="kw">return</span> <span class="num">1</span>;`, fn: null },
      { text: `  <span class="kw">return</span> <span class="param">n</span> <span class="op">*</span> <span class="fn">factorial</span>(<span class="param">n</span> <span class="op">-</span> <span class="num">1</span>);`, fn: null },
      { text: `}`, fn: null },
      { text: ``, fn: null },
      { text: `<span class="kw">function</span> <span class="fn">main</span>() {`, fn: null },
      { text: `  <span class="kw">const</span> <span class="var-c">result</span> <span class="op">=</span> <span class="fn">factorial</span>(<span class="num">4</span>);`, fn: null },
      { text: `  console.<span class="fn">log</span>(<span class="var-c">result</span>);`, fn: null },
      { text: `}`, fn: null },
      { text: ``, fn: null },
      { text: `<span class="fn">main</span>();`, fn: null },
    ],
    steps: [
      { type: 'push', frame: { name: 'main()', icon: '🟢', line: 11 }, line: 10 },
      { type: 'highlight', line: 6 },
      { type: 'push', frame: { name: 'factorial(4)', icon: '🔵', line: 7 }, line: 6 },
      { type: 'highlight', line: 2 },
      { type: 'push', frame: { name: 'factorial(3)', icon: '🟣', line: 2 }, line: 2 },
      { type: 'highlight', line: 2 },
      { type: 'push', frame: { name: 'factorial(2)', icon: '🔴', line: 2 }, line: 2 },
      { type: 'highlight', line: 1 },
      { type: 'push', frame: { name: 'factorial(1)', icon: '🟡', line: 1 }, line: 1 },
      { type: 'highlight', line: 1 },
      { type: 'pop', line: 1, log: 'factorial(1) returns 1' },
      { type: 'pop', line: 2, log: 'factorial(2) returns 2' },
      { type: 'pop', line: 2, log: 'factorial(3) returns 6' },
      { type: 'pop', line: 2, log: 'factorial(4) returns 24' },
      { type: 'highlight', line: 7 },
      { type: 'pop', line: 7, log: 'main() → console.log(24)' },
      { type: 'done' },
    ]
  },

  nested: {
    name: 'nested.js',
    code: [
      { text: `<span class="kw">function</span> <span class="fn">greet</span>(<span class="param">name</span>) {` },
      { text: `  <span class="kw">const</span> <span class="var-c">msg</span> <span class="op">=</span> <span class="fn">buildMsg</span>(<span class="param">name</span>);` },
      { text: `  <span class="kw">return</span> <span class="fn">display</span>(<span class="var-c">msg</span>);` },
      { text: `}` },
      { text: `` },
      { text: `<span class="kw">function</span> <span class="fn">buildMsg</span>(<span class="param">name</span>) {` },
      { text: `  <span class="kw">return</span> <span class="str">"Hello, "</span> <span class="op">+</span> <span class="param">name</span> <span class="op">+</span> <span class="str">"!"</span>;` },
      { text: `}` },
      { text: `` },
      { text: `<span class="kw">function</span> <span class="fn">display</span>(<span class="param">msg</span>) {` },
      { text: `  console.<span class="fn">log</span>(<span class="param">msg</span>);` },
      { text: `}` },
      { text: `` },
      { text: `<span class="fn">greet</span>(<span class="str">"World"</span>);` },
    ],
    steps: [
      { type: 'push', frame: { name: 'greet("World")', icon: '🟢', line: 13 }, line: 13 },
      { type: 'highlight', line: 1 },
      { type: 'push', frame: { name: 'buildMsg("World")', icon: '🔵', line: 1 }, line: 1 },
      { type: 'highlight', line: 6 },
      { type: 'pop', log: 'buildMsg → "Hello, World!"', line: 6 },
      { type: 'highlight', line: 2 },
      { type: 'push', frame: { name: 'display(msg)', icon: '🟣', line: 2 }, line: 2 },
      { type: 'highlight', line: 10 },
      { type: 'pop', log: 'display → logs "Hello, World!"', line: 10 },
      { type: 'pop', log: 'greet("World") complete', line: 0 },
      { type: 'done' },
    ]
  },

  closures: {
    name: 'closures.js',
    code: [
      { text: `<span class="kw">function</span> <span class="fn">makeCounter</span>() {` },
      { text: `  <span class="kw">let</span> <span class="var-c">count</span> <span class="op">=</span> <span class="num">0</span>;` },
      { text: `  <span class="kw">return</span> <span class="kw">function</span> <span class="fn">increment</span>() {` },
      { text: `    <span class="var-c">count</span><span class="op">++</span>;` },
      { text: `    <span class="kw">return</span> <span class="var-c">count</span>;` },
      { text: `  };` },
      { text: `}` },
      { text: `` },
      { text: `<span class="kw">const</span> <span class="var-c">counter</span> <span class="op">=</span> <span class="fn">makeCounter</span>();` },
      { text: `counter(); <span class="cmt">// 1</span>` },
      { text: `counter(); <span class="cmt">// 2</span>` },
      { text: `counter(); <span class="cmt">// 3</span>` },
    ],
    steps: [
      { type: 'push', frame: { name: 'makeCounter()', icon: '🟢', line: 8 }, line: 8 },
      { type: 'highlight', line: 1 },
      { type: 'highlight', line: 2 },
      { type: 'pop', log: 'makeCounter → returns increment fn', line: 2 },
      { type: 'push', frame: { name: 'counter() [call 1]', icon: '🔵', line: 9 }, line: 9 },
      { type: 'highlight', line: 3 },
      { type: 'highlight', line: 4 },
      { type: 'pop', log: 'increment() → count = 1', line: 4 },
      { type: 'push', frame: { name: 'counter() [call 2]', icon: '🟣', line: 10 }, line: 10 },
      { type: 'highlight', line: 3 },
      { type: 'pop', log: 'increment() → count = 2', line: 3 },
      { type: 'push', frame: { name: 'counter() [call 3]', icon: '🔴', line: 11 }, line: 11 },
      { type: 'highlight', line: 3 },
      { type: 'pop', log: 'increment() → count = 3', line: 3 },
      { type: 'done' },
    ]
  },

  async: {
    name: 'callbacks.js',
    code: [
      { text: `<span class="kw">function</span> <span class="fn">fetchData</span>(<span class="param">cb</span>) {` },
      { text: `  <span class="cmt">// simulates async work</span>` },
      { text: `  <span class="fn">setTimeout</span>(() <span class="op">=></span> {` },
      { text: `    <span class="kw">const</span> <span class="var-c">data</span> <span class="op">=</span> <span class="str">"response"</span>;` },
      { text: `    <span class="fn">cb</span>(<span class="var-c">data</span>);` },
      { text: `  }, <span class="num">1000</span>);` },
      { text: `}` },
      { text: `` },
      { text: `<span class="kw">function</span> <span class="fn">handleData</span>(<span class="param">data</span>) {` },
      { text: `  console.<span class="fn">log</span>(<span class="str">"Got:"</span>, <span class="param">data</span>);` },
      { text: `}` },
      { text: `` },
      { text: `<span class="fn">fetchData</span>(<span class="fn">handleData</span>);` },
    ],
    steps: [
      { type: 'push', frame: { name: 'fetchData(handleData)', icon: '🟢', line: 12 }, line: 12 },
      { type: 'highlight', line: 2 },
      { type: 'push', frame: { name: 'setTimeout(cb, 1000)', icon: '🔵', line: 2 }, line: 2 },
      { type: 'pop', log: 'setTimeout → queued to Web API', line: 2 },
      { type: 'pop', log: 'fetchData returns (stack clear)', line: 0 },
      { type: 'highlight', line: 3, log: '⏱ 1000ms later... callback fires' },
      { type: 'push', frame: { name: 'anonymous cb()', icon: '🟣', line: 3 }, line: 3 },
      { type: 'highlight', line: 4 },
      { type: 'push', frame: { name: 'handleData("response")', icon: '🔴', line: 4 }, line: 4 },
      { type: 'highlight', line: 9 },
      { type: 'pop', log: 'handleData → logs "Got: response"', line: 9 },
      { type: 'pop', log: 'callback complete', line: 4 },
      { type: 'done' },
    ]
  }
};

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentPreset = 'recursion';
let steps = [];
let stepIndex = 0;
let stack = [];
let isRunning = false;
let runTimer = null;
let frameColorIdx = 0;

// ─── INIT ──────────────────────────────────────────────────────────────────
function loadPreset(key) {
  resetVisualization();
  currentPreset = key;

  // Update preset buttons
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const preset = PRESETS[key];
  document.getElementById('file-name').textContent = preset.name;
  steps = preset.steps;

  renderCode(preset.code);
  updateStepCounter();
}

function renderCode(lines) {
  const container = document.getElementById('code-display');
  container.innerHTML = lines.map((l, i) =>
    `<div class="code-line" id="line-${i}">
      <span class="line-no">${i + 1}</span>
      <span class="line-code">${l.text}</span>
    </div>`
  ).join('');
}

// ─── VISUALIZATION ─────────────────────────────────────────────────────────
function highlightLine(lineIdx) {
  document.querySelectorAll('.code-line').forEach(el => {
    el.classList.remove('active', 'executing');
  });
  if (lineIdx >= 0) {
    const el = document.getElementById(`line-${lineIdx}`);
    if (el) {
      el.classList.add('active', 'executing');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
}

function renderStack() {
  const visual = document.getElementById('stack-visual');
  const emptyMsg = document.getElementById('empty-msg');
  const depthEl = document.getElementById('stack-depth');

  emptyMsg.style.display = stack.length === 0 ? 'flex' : 'none';
  depthEl.textContent = `depth: ${stack.length}`;

  // Remove old frames (keep label and empty msg)
  visual.querySelectorAll('.stack-frame').forEach(f => f.remove());

  // Render frames bottom-up (last pushed = top = first in DOM reversed)
  [...stack].reverse().forEach((frame, i) => {
    const colorClass = `frame-${frame.colorIdx % 5}`;
    const div = document.createElement('div');
    div.className = `stack-frame ${colorClass}`;
    div.id = `frame-${frame.id}`;
    div.innerHTML = `
      <span class="frame-icon">${frame.icon}</span>
      <span class="frame-name">${frame.name}</span>
      <span class="frame-line">line ${frame.line}</span>
    `;
    visual.insertBefore(div, visual.querySelector('.stack-label'));
  });
}

function pushFrame(frame) {
  frame.colorIdx = frameColorIdx++;
  frame.id = Date.now() + Math.random();
  stack.push(frame);
  renderStack();
  addLog(`push`, `↑ PUSH  ${frame.name}`);
}

function popFrame() {
  if (stack.length === 0) return;
  const frame = stack.pop();
  renderStack();
  addLog(`pop`, `↓ POP   ${frame.name}`);
}

function addLog(type, msg, extra = '') {
  const log = document.getElementById('log-body');
  const classes = { push: 'log-push', pop: 'log-pop', exec: 'log-exec', info: 'log-info' };
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-ts">${stepIndex}</span><span class="${classes[type] || 'log-info'}">${msg}</span>${extra ? `<span style="color:var(--muted);margin-left:auto">${extra}</span>` : ''}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function updateStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = `status-dot ${state}`;
  txt.textContent = text;
}

function updateStepCounter() {
  document.getElementById('step-counter').textContent = `Step ${stepIndex} / ${steps.length}`;
}

// ─── EXECUTION ─────────────────────────────────────────────────────────────
function executeStep(step) {
  switch (step.type) {
    case 'push':
      highlightLine(step.line);
      pushFrame(step.frame);
      break;
    case 'pop':
      if (step.log) addLog('exec', `✓ ${step.log}`);
      highlightLine(step.line);
      popFrame();
      break;
    case 'highlight':
      highlightLine(step.line);
      if (step.log) addLog('info', `ℹ ${step.log}`);
      break;
    case 'done':
      updateStatus('done', 'Execution complete ✓');
      addLog('info', `🏁 Program finished — stack empty`);
      document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active', 'executing'));
      break;
  }
}

function stepForward() {
  if (stepIndex >= steps.length) return;

  updateStatus('running', 'Stepping...');
  executeStep(steps[stepIndex]);
  stepIndex++;
  updateStepCounter();

  if (stepIndex >= steps.length || steps[stepIndex - 1].type === 'done') {
    document.getElementById('btn-step').disabled = true;
    document.getElementById('btn-run').disabled = true;
    updateStatus('done', 'Execution complete ✓');
  }
}

function runAll() {
  if (isRunning) return;
  isRunning = true;
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-step').disabled = true;
  updateStatus('running', 'Running...');

  const speed = parseInt(document.getElementById('speed').value);

  function tick() {
    if (stepIndex >= steps.length) {
      isRunning = false;
      return;
    }
    executeStep(steps[stepIndex]);
    stepIndex++;
    updateStepCounter();

    if (stepIndex < steps.length) {
      runTimer = setTimeout(tick, speed);
    } else {
      isRunning = false;
    }
  }

  tick();
}

function resetVisualization() {
  clearTimeout(runTimer);
  isRunning = false;
  stepIndex = 0;
  stack = [];
  frameColorIdx = 0;

  renderStack();
  document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active', 'executing'));
  document.getElementById('log-body').innerHTML = '';
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-run').disabled = false;
  updateStatus('', 'Ready to execute');
  updateStepCounter();
}

// Speed slider
document.getElementById('speed').addEventListener('input', function() {
  document.getElementById('speed-val').textContent = this.value + 'ms';
});

// Initialize
loadPreset('recursion');
document.querySelector('.preset-btn').classList.add('active');
</script>
